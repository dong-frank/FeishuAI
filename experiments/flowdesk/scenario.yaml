name: flowdesk-sprint-12
team: FlowDesk 工单平台 Scrum Team
story:
  id: FD-124
  title: 工单列表支持按优先级筛选
  branch: feature/fd-124-priority-filter
roles:
  scrum_master:
    name: 周启明
    responsibility: 召集站会、暴露 blocker、推动 review 会议安排
  product_owner:
    name: 林若澄
    responsibility: 查看需求完成情况、维护验收标准、确认 Story 是否进入待 Review
  senior_developer:
    name: 许嘉宁
    responsibility: 负责 tickets 模块协作 review，并维护整体项目 CI/CD
  new_developer:
    name: 陈宇航
    responsibility: 新加入团队的开发者，领取 FD-124 并使用 git-helper 完成任务
day_story:
  title: New Dev 陈宇航的一天
  standup_context:
    - Scrum Master 周启明主持早上站会，只负责引入任务和协作关系，不触发工具使用。
    - Product Owner 林若澄希望今天推进 FD-124，关注需求是否进入待 Review。
    - Senior Dev 许嘉宁说明自己正在处理 FD-123 和 CI/CD，需要陈宇航 push 后约 review。
    - New Dev 陈宇航领取 FD-124，站会结束后回到终端开始实际开发。
stages:
  fresh:
    case_id: FD-124-FRESH
    expected_phase: none
    recommended_command: git status
  commit-message:
    case_id: FD-124-COMMIT
    expected_phase: beforeRun
    recommended_command: git commit
  conflict:
    case_id: FD-124-CONFLICT
    expected_phase: afterFail
    recommended_command: git pull --rebase origin main
  upstream:
    case_id: FD-124-UPSTREAM
    expected_phase: afterFail
    recommended_command: git push
  post-push:
    case_id: FD-124-POST-PUSH
    expected_phase: afterSuccess
    recommended_command: git push -u origin feature/fd-124-priority-filter
